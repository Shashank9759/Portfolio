<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shashank Ranjan - SDE-1 Android & Cross-Platform Mobile Developer. Portfolio showcasing Kotlin, Jetpack Compose, KMP, and mobile development expertise.">
    <meta name="keywords" content="Android Developer, Kotlin, Jetpack Compose, Kotlin Multiplatform, Compose Multiplatform, Mobile Developer, Freelance">
    <meta name="author" content="Shashank Ranjan">
    <meta property="og:title" content="Shashank Ranjan | Mobile Developer Portfolio">
    <meta property="og:description" content="SDE-1 Android & Cross-Platform Mobile Developer specializing in Kotlin, Jetpack Compose, and KMP.">
    <meta property="og:type" content="website">
    <title>Shashank Ranjan | Mobile Developer Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>SR</text></svg>">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0B0F1A;
        }
        #loading {
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            color: #F1F5F9;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(129, 140, 248, 0.2);
            border-top-color: #818CF8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #ComposeTarget {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
<div id="loading">
    <div class="spinner"></div>
    <p>Loading Portfolio...</p>
</div>
<canvas id="ComposeTarget" oncontextmenu="event.preventDefault()"></canvas>
<script src="portfolio.js"></script>
<script>
    // Hide loader once the Wasm module fires its load event
    // portfolio.js dispatches this after Compose initializes
    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById('loading');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 300);
            }
        }, 500); // small delay so Compose paints first
    });
</script>
</body>
</html>
